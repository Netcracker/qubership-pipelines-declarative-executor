name: Build Dev Image

on:
  workflow_dispatch:
    inputs:
      custom_dev_tag:
        description: "Specific version to release:"
        default: dev_feature_name
        type: string
        required: true

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    # requirements.txt generation
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Export requirements.txt
      run: pip install poetry && poetry self add poetry-plugin-export && poetry export -f requirements.txt --output requirements.txt --without-hashes

    - name: Build and Publish Docker image
      uses: netcracker/qubership-workflow-hub/actions/docker-action@b2468074afe9e14270e4d3967376cded733da360 #v2.0.5
      with:
        ref: ${{ github.ref_name }}
        checkout: false
        custom-image-name: qubership-pipelines-declarative-executor
        platforms: linux/amd64
        tags: ${{ inputs.custom_dev_tag }}
        dry-run: false
        download-artifact: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
